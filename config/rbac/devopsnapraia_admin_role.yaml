# This rule is not used by the project devopsnapraia-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over community.devops.org.pt.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: devopsnapraia-operator
    app.kubernetes.io/managed-by: kustomize
  name: devopsnapraia-admin-role
rules:
- apiGroups:
  - community.devops.org.pt
  resources:
  - devopsnapraia
  verbs:
  - '*'
- apiGroups:
  - community.devops.org.pt
  resources:
  - devopsnapraia/status
  verbs:
  - get
